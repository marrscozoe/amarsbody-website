<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#0a0a0a"/>
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff87"/>
      <stop offset="100%" style="stop-color:#00cc6a"/>
    </linearGradient>
  </defs>
  <!-- Idea 5: Muscle Arc -->
  <text x="50" y="40" font-family="Arial" font-size="40" fill="white">5. Muscle Arc</text>
  <path d="M60 100 Q90 60 120 100" stroke="url(#grad1)" stroke-width="8" fill="none"/>
  <text x="50" y="130" font-family="Arial" font-size="14" fill="#666">Bicep silhouette</text>
  
  <!-- Idea 6: Flame A -->
  <text x="200" y="40" font-family="Arial" font-size="40" fill="white">6. Flame A</text>
  <path d="M230 120 L250 80 L260 100 L280 60 L270 120 Z" fill="url(#grad1)"/>
  <text x="200" y="130" font-family="Arial" font-size="14" fill="#666">Transformation</text>
  
  <!-- Idea 7: Diamond Shield -->
  <text x="50" y="170" font-family="Arial" font-size="40" fill="white">7. Diamond Shield</text>
  <polygon points="100,200 130,220 100,260 70,220" fill="none" stroke="url(#grad1)" stroke-width="3"/>
  <text x="85" y="235" font-family="Arial Black" font-size="20" fill="white">AM</text>
  
  <!-- Idea 8: Barbell O -->
  <text x="200" y="170" font-family="Arial" font-size="40" fill="white">8. Barbell O</text>
  <rect x="250" y="200" width="10" height="40" rx="5" fill="url(#grad1)"/>
  <rect x="290" y="200" width="10" height="40" rx="5" fill="url(#grad1)"/>
  <rect x="245" y="215" width="60" height="10" fill="url(#grad1)"/>
  <text x="260" y="260" font-family="Arial" font-size="14" fill="#666">Body with barbell</text>
</svg>
