<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900">
  <rect width="800" height="900" fill="#0a0a0a"/>
  <defs>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b00"/>
      <stop offset="100%" style="stop-color:#ff9500"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#007aff"/>
      <stop offset="100%" style="stop-color:#00c7ff"/>
    </linearGradient>
  </defs>
  
  <!-- 1: Simple Bold White -->
  <text x="40" y="80" font-family="sans-serif" font-size="32" fill="#888">1. Pure white bold</text>
  <text x="40" y="150" font-family="sans-serif" font-size="80" fill="white" font-weight="bold">AMARSBODY</text>
  
  <!-- 2: Simple Bold Orange -->
  <text x="40" y="250" font-family="sans-serif" font-size="32" fill="#888">2. Pure orange bold</text>
  <text x="40" y="320" font-family="sans-serif" font-size="80" fill="url(#orangeGrad)" font-weight="bold">AMARSBODY</text>
  
  <!-- 3: Simple Bold Blue -->
  <text x="40" y="420" font-family="sans-serif" font-size="32" fill="#888">3. Pure blue bold</text>
  <text x="40" y="490" font-family="sans-serif" font-size="80" fill="url(#blueGrad)" font-weight="bold">AMARSBODY</text>
  
  <!-- 4: White Orange White -->
  <text x="40" y="590" font-family="sans-serif" font-size="32" fill="#888">4. White - Orange - White</text>
  <text x="40" y="660" font-family="sans-serif" font-size="80" fill="white" font-weight="bold">AMARS</text>
  <text x="330" y="660" font-family="sans-serif" font-size="80" fill="url(#orangeGrad)" font-weight="bold">BODY</text>
  
  <!-- 5: Just split -->
  <text x="40" y="760" font-family="sans-serif" font-size="32" fill="#888">5. Split with space</text>
  <text x="40" y="830" font-family="sans-serif" font-size="75" fill="white" font-weight="bold">AMARS </text>
  <text x="330" y="830" font-family="sans-serif" font-size="75" fill="url(#blueGrad)" font-weight="bold">BODY</text>
</svg>
