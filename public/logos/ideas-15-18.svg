<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#0a0a0a"/>
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff87"/>
      <stop offset="100%" style="stop-color:#00cc6a"/>
    </linearGradient>
  </defs>
  <!-- Idea 15: Rings -->
  <text x="50" y="40" font-family="Arial" font-size="40" fill="white">15. Ring Icon</text>
  <circle cx="80" cy="100" r="15" fill="none" stroke="white" stroke-width="3"/>
  <circle cx="115" cy="100" r="15" fill="none" stroke="white" stroke-width="3"/>
  <circle cx="150" cy="100" r="15" fill="none" stroke="url(#grad1)" stroke-width="3"/>
  <text x="50" y="140" font-family="Arial" font-size="14" fill="#666">3 rings (A-M-B)</text>
  
  <!-- Idea 16: Checkmark Badge -->
  <text x="200" y="40" font-family="Arial" font-size="40" fill="white">16. Checkmark</text>
  <circle cx="270" cy="100" r="30" fill="none" stroke="url(#grad1)" stroke-width="3"/>
  <polyline points="255,100 265,110 285,85" fill="none" stroke="url(#grad1)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="200" y="140" font-family="Arial" font-size="14" fill="#666">Seal/ badge</text>
  
  <!-- Idea 17: Crown -->
  <text x="50" y="170" font-family="Arial" font-size="40" fill="white">17. Crown</text>
  <polygon points="70,210 90,190 110,210 130,190 150,210 150,230 70,230" fill="url(#grad1)"/>
  <text x="50" y="250" font-family="Arial" font-size="14" fill="#666">King/queen of your body</text>
  
  <!-- Idea 18: Lightning -->
  <text x="200" y="170" font-family="Arial" font-size="40" fill="white">18. Lightning</text>
  <text x="240" y="230" font-family="Arial Black" font-size="60" fill="white">A</text>
  <polygon points="280,190 260,220 275,220 255,260" fill="url(#grad1)"/>
  <text x="200" y="270" font-family="Arial" font-size="14" fill="#666">Energy/power</text>
</svg>
