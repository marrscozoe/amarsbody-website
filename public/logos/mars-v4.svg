<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700">
  <rect width="800" height="700" fill="#0a0a0a"/>
  
  <defs>
    <radialGradient id="marsGrad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#ff8866"/>
      <stop offset="50%" style="stop-color:#cc4400"/>
      <stop offset="100%" style="stop-color:#992200"/>
    </radialGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b00"/>
      <stop offset="100%" style="stop-color:#ff9500"/>
    </linearGradient>
  </defs>
  
  <!-- 1: Orange dot between -->
  <text x="30" y="50" font-family="sans-serif" font-size="20" fill="#888">1. Dot between</text>
  <text x="30" y="100" font-family="sans-serif" font-size="48" fill="white" font-weight="700">AMARS</text>
  <circle cx="175" cy="95" r="10" fill="url(#orangeGrad)"/>
  <text x="200" y="100" font-family="sans-serif" font-size="48" fill="white" font-weight="700">BODY</text>
  
  <!-- 2: Small dot after Body -->
  <text x="30" y="180" font-family="sans-serif" font-size="20" fill="#888">2. Dot after</text>
  <text x="30" y="230" font-family="sans-serif" font-size="48" fill="white" font-weight="700">AMARSBODY</text>
  <circle cx="295" cy="225" r="8" fill="url(#orangeGrad)"/>
  
  <!-- 3: Mars icon left -->
  <text x="30" y="310" font-family="sans-serif" font-size="20" fill="#888">3. Icon left</text>
  <circle cx="60" cy="355" r="18" fill="url(#marsGrad)"/>
  <text x="95" y="360" font-family="sans-serif" font-size="48" fill="white" font-weight="700">AMARSBODY</text>
  
  <!-- 4: Mars icon right -->
  <text x="30" y="440" font-family="sans-serif" font-size="20" fill="#888">4. Icon right</text>
  <text x="30" y="490" font-family="sans-serif" font-size="48" fill="white" font-weight="700">AMARSBODY</text>
  <circle cx="330" cy="485" r="18" fill="url(#marsGrad)"/>
  
  <!-- 5: Thin underline -->
  <text x="30" y="570" font-family="sans-serif" font-size="20" fill="#888">5. Thin underline</text>
  <text x="30" y="620" font-family="sans-serif" font-size="48" fill="white" font-weight="700">AMARSBODY</text>
  <rect x="30" y="635" width="310" height="3" fill="url(#orangeGrad)"/>
  
  <!-- 6: Orange arrow -->
  <text x="420" y="50" font-family="sans-serif" font-size="20" fill="#888">6. Arrow accent</text>
  <text x="420" y="100" font-family="sans-serif" font-size="48" fill="white" font-weight="700">AMARSBODY</text>
  <polygon points="420,115 430,105 430,112 450,112 450,118 430,118 430,125" fill="url(#orangeGrad)"/>
  
  <!-- 7: Circle behind A -->
  <text x="420" y="180" font-family="sans-serif" font-size="20" fill="#888">7. Circle on A</text>
  <circle cx="460" cy="225" r="20" fill="url(#marsGrad)" opacity="0.7"/>
  <text x="420" y="230" font-family="sans-serif" font-size="48" fill="white" font-weight="700">AMARSBODY</text>
  
  <!-- 8: Underline left -->
  <text x="420" y="310" font-family="sans-serif" font-size="20" fill="#888">8. Left underline</text>
  <rect x="420" y="330" width="60" height="6" fill="url(#orangeGrad)"/>
  <text x="420" y="360" font-family="sans-serif" font-size="48" fill="white" font-weight="700">AMARSBODY</text>
  
  <!-- 9: Two dots -->
  <text x="420" y="440" font-family="sans-serif" font-size="20" fill="#888">9. Two dots</text>
  <text x="420" y="490" font-family="sans-serif" font-size="48" fill="white" font-weight="700">AMARSBODY</text>
  <circle cx="500" cy="485" r="6" fill="url(#orangeGrad)"/>
  <circle cx="530" cy="485" r="6" fill="url(#orangeGrad)"/>
  
  <!-- 10: Bracket left -->
  <text x="420" y="570" font-family="sans-serif" font-size="20" fill="#888">10. Bracket</text>
  <text x="420" y="620" font-family="sans-serif" font-size="48" fill="white" font-weight="700">AMARSBODY</text>
  <text x="405" y="620" font-family="sans-serif" font-size="48" fill="url(#orangeGrad)">[</text>
  
  <!-- 11: Overline -->
  <text x="420" y="650" font-family="sans-serif" font-size="20" fill="#888">11. Overline</text>
  <text x="420" y="700" font-family="sans-serif" font-size="48" fill="white" font-weight="700">AMARSBODY</text>
  <rect x="420" y="670" width="310" height="4" fill="url(#orangeGrad)"/>
</svg>
