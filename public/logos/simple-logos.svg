<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#0a0a0a"/>
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff87"/>
      <stop offset="100%" style="stop-color:#00cc6a"/>
    </linearGradient>
  </defs>
  
  <!-- 1: Simple Bold -->
  <text x="50" y="60" font-family="sans-serif" font-size="48" fill="white" font-weight="bold">1. AMARSBODY</text>
  
  <!-- 2: Simple Bold Green -->
  <text x="50" y="120" font-family="sans-serif" font-size="48" fill="url(#grad1)" font-weight="bold">2. AMARSBODY</text>
  
  <!-- 3: With Space -->
  <text x="50" y="180" font-family="sans-serif" font-size="48" fill="white" font-weight="bold">3. AMARS BODY</text>
  
  <!-- 4: AMARS green BODY white -->
  <text x="50" y="240" font-family="sans-serif" font-size="48" fill="url(#grad1)" font-weight="bold">4. AMARS</text>
  <text x="230" y="240" font-family="sans-serif" font-size="48" fill="white" font-weight="bold">BODY</text>
  
  <!-- 5: Italic Bold -->
  <text x="50" y="300" font-family="sans-serif" font-size="48" fill="white" font-weight="bold" font-style="italic">6. AMARSBODY</text>
  
  <!-- 6: Simple -->
  <text x="50" y="360" font-family="sans-serif" font-size="48" fill="url(#grad1)" font-weight="bold">7. AMARS BODY</text>
</svg>
