<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900">
  <rect width="800" height="900" fill="#0a0a0a"/>
  <defs>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b00"/>
      <stop offset="100%" style="stop-color:#ff9500"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#007aff"/>
      <stop offset="100%" style="stop-color:#00c7ff"/>
    </linearGradient>
  </defs>
  
  <!-- 1: PitFit Style - Bold Italic -->
  <text x="40" y="80" font-family="sans-serif" font-size="32" fill="#888">1. Bold Italic (PitFit style)</text>
  <text x="40" y="140" font-family="sans-serif" font-size="70" fill="white" font-weight="bold" font-style="italic" letter-spacing="1">AMARSBODY</text>
  
  <!-- 2: Stacked -->
  <text x="40" y="220" font-family="sans-serif" font-size="32" fill="#888">2. Stacked</text>
  <text x="40" y="270" font-family="sans-serif" font-size="60" fill="white" font-weight="bold">AMARS</text>
  <text x="40" y="330" font-family="sans-serif" font-size="60" fill="url(#orangeGrad)" font-weight="bold">BODY</text>
  
  <!-- 3: Connected -->
  <text x="40" y="410" font-family="sans-serif" font-size="32" fill="#888">3. Connected letters</text>
  <text x="40" y="470" font-family="sans-serif" font-size="65" fill="white" font-weight="bold">AMARS<BODY/></text>
  
  <!-- 4: Underline -->
  <text x="40" y="550" font-family="sans-serif" font-size="32" fill="#888">4. Underline accent</text>
  <text x="40" y="610" font-family="sans-serif" font-size="65" fill="white" font-weight="bold" font-style="italic">AMARSBODY</text>
  <rect x="40" y="625" width="380" height="8" fill="url(#orangeGrad)"/>
  
  <!-- 5: Boxed -->
  <text x="40" y="700" font-family="sans-serif" font-size="32" fill="#888">5. Boxed</text>
  <rect x="35" y="720" width="400" height="80" rx="5" fill="none" stroke="url(#orangeGrad)" stroke-width="4"/>
  <text x="45" y="775" font-family="sans-serif" font-size="55" fill="white" font-weight="bold" font-style="italic">AMARSBODY</text>
  
  <!-- 6: Subtle -->
  <text x="40" y="860" font-family="sans-serif" font-size="32" fill="#888">6. Subtle split</text>
  <text x="40" y="910" font-family="sans-serif" font-size="60" fill="white" font-weight="bold" letter-spacing="-1">AMARS</text>
  <text x="320" y="910" font-family="sans-serif" font-size="60" fill="url(#blueGrad)" font-weight="bold" letter-spacing="-1">BODY</text>
</svg>
