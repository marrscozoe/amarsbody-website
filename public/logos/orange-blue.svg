<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <rect width="800" height="800" fill="#0a0a0a"/>
  <defs>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b00"/>
      <stop offset="100%" style="stop-color:#ff9500"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#007aff"/>
      <stop offset="100%" style="stop-color:#00c7ff"/>
    </linearGradient>
  </defs>
  
  <!-- 1: Bold Italic -->
  <text x="40" y="80" font-family="sans-serif" font-size="36" fill="#888" font-weight="bold" font-style="italic">1. Bold Italic</text>
  <text x="40" y="130" font-family="sans-serif" font-size="60" fill="white" font-weight="bold" font-style="italic">AMARSBODY</text>
  
  <!-- 2: Split Orange/Blue -->
  <text x="40" y="210" font-family="sans-serif" font-size="36" fill="#888" font-weight="bold" font-style="italic">2. Orange + Blue Split</text>
  <text x="40" y="260" font-family="sans-serif" font-size="60" fill="url(#orangeGrad)" font-weight="bold" font-style="italic">AMARS</text>
  <text x="320" y="260" font-family="sans-serif" font-size="60" fill="url(#blueGrad)" font-weight="bold" font-style="italic">BODY</text>
  
  <!-- 3: All Orange -->
  <text x="40" y="340" font-family="sans-serif" font-size="36" fill="#888" font-weight="bold">3. All Orange</text>
  <text x="40" y="390" font-family="sans-serif" font-size="60" fill="url(#orangeGrad)" font-weight="bold">AMARSBODY</text>
  
  <!-- 4: All Blue -->
  <text x="40" y="470" font-family="sans-serif" font-size="36" fill="#888" font-weight="bold">4. All Blue</text>
  <text x="40" y="520" font-family="sans-serif" font-size="60" fill="url(#blueGrad)" font-weight="bold">AMARSBODY</text>
  
  <!-- 5: White + Orange + Blue -->
  <text x="40" y="600" font-family="sans-serif" font-size="36" fill="#888" font-weight="bold">5. White + Orange + Blue</text>
  <text x="40" y="650" font-family="sans-serif" font-size="60" fill="white" font-weight="bold" font-style="italic">AMARS</text>
  <text x="280" y="650" font-family="sans-serif" font-size="60" fill="url(#orangeGrad)" font-weight="bold" font-style="italic">BODY</text>
  
  <!-- 6: Simple with space -->
  <text x="40" y="730" font-family="sans-serif" font-size="36" fill="#888" font-weight="bold">6. Blue with space</text>
  <text x="40" y="780" font-family="sans-serif" font-size="55" fill="url(#blueGrad)" font-weight="bold">AMARS BODY</text>
</svg>
