<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#ffffff"/>
  
  <defs>
    <linearGradient id="coralGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff7e5f"/>
      <stop offset="100%" style="stop-color:#feb47b"/>
    </linearGradient>
    <linearGradient id="roseGoldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b76e79"/>
      <stop offset="100%" style="stop-color:#e4b4c4"/>
    </linearGradient>
  </defs>
  
  <!-- 1: Clean white on white -->
  <text x="30" y="50" font-family="sans-serif" font-size="20" fill="#888">1. Clean white (most elegant)</text>
  <text x="30" y="100" font-family="sans-serif" font-size="42" fill="#333" font-weight="300">amarsbody</text>
  
  <!-- 2: Coral gradient -->
  <text x="30" y="170" font-family="sans-serif" font-size="20" fill="#888">2. Coral sunset</text>
  <text x="30" y="220" font-family="sans-serif" font-size="42" fill="url(#coralGrad)" font-weight="400">amarsbody</text>
  
  <!-- 3: Rose gold -->
  <text x="30" y="290" font-family="sans-serif" font-size="20" fill="#888">3. Rose gold (premium)</text>
  <text x="30" y="340" font-family="sans-serif" font-size="42" fill="url(#roseGoldGrad)" font-weight="400">amarsbody</text>
  
  <!-- 4: Soft grey + coral -->
  <text x="30" y="410" font-family="sans-serif" font-size="20" fill="#888">4. Grey + coral</text>
  <text x="30" y="460" font-family="sans-serif" font-size="40" fill="#555" font-weight="300">amars</text>
  <text x="160" y="460" font-family="sans-serif" font-size="40" fill="url(#coralGrad)" font-weight="400">body</text>
  
  <!-- 5: Thin elegant -->
  <text x="30" y="530" font-family="sans-serif" font-size="20" fill="#888">5. Thin elegant</text>
  <text x="30" y="580" font-family="sans-serif" font-size="38" fill="#333" font-weight="200" letter-spacing="2">AMARS BODY</text>
  
  <!-- 6: Black + rose dot -->
  <text x="420" y="50" font-family="sans-serif" font-size="20" fill="#888">6. Black with rose dot</text>
  <text x="420" y="100" font-family="sans-serif" font-size="40" fill="#333" font-weight="400">amarsbody</text>
  <circle cx="680" cy="95" r="8" fill="url(#roseGoldGrad)"/>
  
  <!-- 7: All caps light -->
  <text x="420" y="170" font-family="sans-serif" font-size="20" fill="#888">7. Light caps</text>
  <text x="420" y="220" font-family="sans-serif" font-size="38" fill="#444" font-weight="300" letter-spacing="3">AMARSBODY</text>
  
  <!-- 8: Minimal underline -->
  <text x="420" y="290" font-family="sans-serif" font-size="20" fill="#888">8. Soft underline</text>
  <text x="420" y="340" font-family="sans-serif" font-size="40" fill="#333" font-weight="400">amarsbody</text>
  <rect x="420" y="355" width="180" height="2" fill="url(#coralGrad)"/>
  
  <!-- 9: Split elegant -->
  <text x="420" y="410" font-family="sans-serif" font-size="20" fill="#888">9. Elegant split</text>
  <text x="420" y="460" font-family="sans-serif" font-size="38" fill="#333" font-weight="300">amars</text>
  <text x="560" y="460" font-family="sans-serif" font-size="38" fill="#888" font-weight="300">body</text>
  
  <!-- 10: Circle accent -->
  <text x="420" y="530" font-family="sans-serif" font-size="20" fill="#888">10. Circle accent</text>
  <text x="420" y="580" font-family="sans-serif" font-size="40" fill="#333" font-weight="400">amarsbody</text>
  <circle cx="660" cy="570" r="18" fill="none" stroke="url(#coralGrad)" stroke-width="2"/>
</svg>
