<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#0a0a0a"/>
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff87"/>
      <stop offset="100%" style="stop-color:#00cc6a"/>
    </linearGradient>
  </defs>
  <!-- Idea 1: Bold Monogram AM -->
  <text x="50" y="60" font-family="Arial Black" font-size="40" fill="white">1. Bold Monogram</text>
  <text x="50" y="120" font-family="Arial Black" font-size="50" fill="url(#grad1)">AM</text>
  <text x="50" y="150" font-family="Arial" font-size="14" fill="#666">Sharp angles, modern</text>
  
  <!-- Idea 2: Arrow A -->
  <text x="200" y="60" font-family="Arial" font-size="40" fill="white">2. Arrow A</text>
  <polygon points="230,100 260,140 245,140 245,170 215,170 215,140 200,140" fill="url(#grad1)"/>
  <text x="200" y="200" font-family="Arial" font-size="14" fill="#666">Upward progress</text>
  
  <!-- Idea 3: Mountain Peak -->
  <text x="50" y="220" font-family="Arial" font-size="40" fill="white">3. Mountain Peak</text>
  <polygon points="80,270 110,220 140,270" fill="url(#grad1)"/>
  <text x="80" y="290" font-family="Arial" font-size="14" fill="#666">Strength journey</text>
  
  <!-- Idea 4: Hexagon -->
  <text x="250" y="220" font-family="Arial" font-size="40" fill="white">4. Hexagon</text>
  <polygon points="300,220 330,235 330,265 300,280 270,265 270,235" fill="none" stroke="url(#grad1)" stroke-width="3"/>
  <text x="280" y="255" font-family="Arial Black" font-size="24" fill="white">AM</text>
</svg>
