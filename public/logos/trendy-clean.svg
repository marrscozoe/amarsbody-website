<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <rect width="800" height="800" fill="#0a0a0a"/>
  <defs>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b00"/>
      <stop offset="100%" style="stop-color:#ff9500"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#007aff"/>
      <stop offset="100%" style="stop-color:#00c7ff"/>
    </linearGradient>
  </defs>
  
  <!-- 1: Minimal lowercase -->
  <text x="40" y="70" font-family="sans-serif" font-size="24" fill="#666">1. Minimal lowercase</text>
  <text x="40" y="130" font-family="sans-serif" font-size="65" fill="white" font-weight="300">amarsbody</text>
  
  <!-- 2: Bold caps tight -->
  <text x="40" y="210" font-family="sans-serif" font-size="24" fill="#666">2. Bold caps tight</text>
  <text x="40" y="270" font-family="sans-serif" font-size="70" fill="white" font-weight="700" letter-spacing="-1">AMARSBODY</text>
  
  <!-- 3: Orange minimal -->
  <text x="40" y="350" font-family="sans-serif" font-size="24" fill="#666">3. Orange minimal</text>
  <text x="40" y="410" font-family="sans-serif" font-size="65" fill="url(#orangeGrad)" font-weight="400">amarsbody</text>
  
  <!-- 4: Blue bold -->
  <text x="40" y="490" font-family="sans-serif" font-size="24" fill="#666">4. Blue bold</text>
  <text x="40" y="550" font-family="sans-serif" font-size="70" fill="url(#blueGrad)" font-weight="700">AMARSBODY</text>
  
  <!-- 5: Thin bold combo -->
  <text x="40" y="630" font-family="sans-serif" font-size="24" fill="#666">5. Thin + bold combo</text>
  <text x="40" y="700" font-family="sans-serif" font-size="60" fill="white" font-weight="300">AMARS</text>
  <text x="260" y="700" font-family="sans-serif" font-size="60" fill="url(#orangeGrad)" font-weight="700">BODY</text>
  
  <!-- 6: Very light thin -->
  <text x="40" y="760" font-family="sans-serif" font-size="24" fill="#666">6. Thin light</text>
  <text x="40" y="790" font-family="sans-serif" font-size="45" fill="#888" font-weight="200">amars body</text>
</svg>
