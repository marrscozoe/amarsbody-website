<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#0a0a0a"/>
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff87"/>
      <stop offset="100%" style="stop-color:#00cc6a"/>
    </linearGradient>
  </defs>
  
  <!-- 1: Bold Italic Wordmark -->
  <rect x="20" y="20" width="360" height="130" rx="10" fill="#151515" stroke="#333"/>
  <text x="40" y="70" font-family="Arial Black" font-size="50" fill="white" font-style="italic" transform="skewX(-10)">AMARSBODY</text>
  <text x="40" y="120" font-family="Arial" font-size="14" fill="#666">Bold italic wordmark</text>
  
  <!-- 2: Split Bold -->
  <rect x="420" y="20" width="360" height="130" rx="10" fill="#151515" stroke="#333"/>
  <text x="440" y="70" font-family="Arial Black" font-size="50" fill="url(#grad1)" font-style="italic" transform="skewX(-10)">AMARS</text>
  <text x="640" y="70" font-family="Arial Black" font-size="50" fill="white" font-style="italic" transform="skewX(-10)">BODY</text>
  <text x="440" y="120" font-family="Arial" font-size="14" fill="#666">Split wordmark</text>
  
  <!-- 3: Heavy Caps -->
  <rect x="20" y="170" width="360" height="130" rx="10" fill="#151515" stroke="#333"/>
  <text x="40" y="90" font-family="Impact, Arial Black, sans-serif" font-size="55" fill="white" letter-spacing="2">AMARSBODY</text>
  <text x="40" y="130" font-family="Arial" font-size="14" fill="#666">Impact heavy caps</text>
  
  <!-- 4: Gradient Bold -->
  <rect x="420" y="170" width="360" height="130" rx="10" fill="#151515" stroke="#333"/>
  <text x="440" y="90" font-family="Arial Black" font-size="45" fill="url(#grad1)" letter-spacing="1">AMARSBODY</text>
  <text x="440" y="130" font-family="Arial" font-size="14" fill="#666">Gradient bold</text>
  
  <!-- 5: White + Green Accent -->
  <rect x="20" y="320" width="360" height="130" rx="10" fill="#151515" stroke="#333"/>
  <text x="40" y="90" font-family="Arial Black" font-size="45" fill="white" font-style="italic" transform="skewX(-10)">AMARS</text>
  <text x="250" y="90" font-family="Arial Black" font-size="45" fill="url(#grad1)" font-style="italic" transform="skewX(-10)">BODY</text>
  <text x="40" y="130" font-family="Arial" font-size="14" fill="#666">White + green accent</text>
  
  <!-- 6: Tight Spacing -->
  <rect x="420" y="320" width="360" height="130" rx="10" fill="#151515" stroke="#333"/>
  <text x="440" y="90" font-family="Arial Black" font-size="48" fill="url(#grad1)" letter-spacing="-2">AMARSBODY</text>
  <text x="440" y="130" font-family="Arial" font-size="14" fill="#666">Tight spacing</text>
  
  <!-- 7: Outlined -->
  <rect x="20" y="470" width="360" height="130" rx="10" fill="#151515" stroke="#333"/>
  <text x="40" y="90" font-family="Arial Black" font-size="55" fill="none" stroke="white" stroke-width="3" font-style="italic" transform="skewX(-10)">AMARSBODY</text>
  <text x="40" y="130" font-family="Arial" font-size="14" fill="#666">Outlined (white)</text>
  
  <!-- 8: Simple Clean -->
  <rect x="420" y="470" width="360" height="130" rx="10" fill="#151515" stroke="#333"/>
  <text x="440" y="90" font-family="Arial, sans-serif" font-size="50" fill="url(#grad1)" font-weight="bold">AMARS BODY</text>
  <text x="440" y="130" font-family="Arial" font-size="14" fill="#666">Simple clean (space)</text>
</svg>
