<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <rect width="800" height="800" fill="#0a0a0a"/>
  
  <defs>
    <radialGradient id="marsGrad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#ff8866"/>
      <stop offset="50%" style="stop-color:#cc4400"/>
      <stop offset="100%" style="stop-color:#992200"/>
    </radialGradient>
  </defs>
  
  <!-- 1: Mars gradient circle background -->
  <text x="30" y="60" font-family="sans-serif" font-size="24" fill="#888">1. Planet glow</text>
  <circle cx="220" cy="160" r="120" fill="url(#marsGrad)" opacity="0.7"/>
  <text x="30" y="180" font-family="sans-serif" font-size="52" fill="white" font-weight="700">AMARSBODY</text>
  
  <!-- 2: Small mars dot in O -->
  <text x="30" y="300" font-family="sans-serif" font-size="24" fill="#888">2. Planet in O</text>
  <text x="30" y="360" font-family="sans-serif" font-size="60" fill="white" font-weight="700">AMARS</text>
  <circle cx="240" cy="400" r="20" fill="url(#marsGrad)"/>
  <text x="270" y="360" font-family="sans-serif" font-size="60" fill="white" font-weight="700">BODY</text>
  
  <!-- 3: Mars line accent -->
  <text x="30" y="480" font-family="sans-serif" font-size="24" fill="#888">3. Planet line</text>
  <text x="30" y="540" font-family="sans-serif" font-size="55" fill="white" font-weight="700">AMARSBODY</text>
  <rect x="30" y="555" width="350" height="6" rx="3" fill="url(#marsGrad)"/>
  
  <!-- 4: Just planet icon -->
  <text x="30" y="650" font-family="sans-serif" font-size="24" fill="#888">4. Icon + text</text>
  <circle cx="80" cy="710" r="30" fill="url(#marsGrad)"/>
  <text x="130" y="740" font-family="sans-serif" font-size="48" fill="white" font-weight="700">AMARSBODY</text>
  
  <!-- 5: Mars color text -->
  <text x="30" y="800" font-family="sans-serif" font-size="24" fill="#888">5. Planet color text</text>
  <text x="30" y="850" font-family="sans-serif" font-size="55" fill="url(#marsGrad)" font-weight="700">AMARSBODY</text>
</svg>
