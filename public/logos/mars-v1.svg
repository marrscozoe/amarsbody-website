<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900">
  <rect width="800" height="900" fill="#0a0a0a"/>
  
  <!-- Mars planet gradient -->
  <defs>
    <radialGradient id="marsGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff6b00"/>
      <stop offset="70%" style="stop-color:#c43c00"/>
      <stop offset="100%" style="stop-color:#8b2500"/>
    </radialGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b00"/>
      <stop offset="100%" style="stop-color:#ff9500"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#007aff"/>
      <stop offset="100%" style="stop-color:#00c7ff"/>
    </linearGradient>
  </defs>
  
  <!-- 1: Mars circle behind text -->
  <text x="40" y="70" font-family="sans-serif" font-size="28" fill="#888">1. Mars behind text</text>
  <circle cx="230" cy="170" r="90" fill="url(#marsGrad)" opacity="0.6"/>
  <text x="40" y="190" font-family="sans-serif" font-size="60" fill="white" font-weight="700">AMARSBODY</text>
  
  <!-- 2: Mars accent dot -->
  <text x="40" y="300" font-family="sans-serif" font-size="28" fill="#888">2. Mars dot accent</text>
  <circle cx="280" cy="360" r="25" fill="url(#marsGrad)"/>
  <text x="40" y="400" font-family="sans-serif" font-size="60" fill="white" font-weight="700">AMARSBODY</text>
  
  <!-- 3: Mars ring -->
  <text x="40" y="520" font-family="sans-serif" font-size="28" fill="#888">3. Mars ring</text>
  <circle cx="240" cy="580" r="50" fill="none" stroke="url(#marsGrad)" stroke-width="4"/>
  <circle cx="240" cy="580" r="35" fill="none" stroke="url(#marsGrad)" stroke-width="4"/>
  <text x="40" y="620" font-family="sans-serif" font-size="60" fill="white" font-weight="700">AMARSBODY</text>
  
  <!-- 4: Text inside Mars -->
  <text x="40" y="740" font-family="sans-serif" font-size="28" fill="#888">4. Text inside planet</text>
  <circle cx="230" cy="830" r="80" fill="url(#marsGrad)"/>
  <text x="160" y="870" font-family="sans-serif" font-size="28" fill="white" font-weight="700">AM</text>
  <text x="280" y="870" font-family="sans-serif" font-size="28" fill="white" font-weight="700">BODY</text>
  
  <!-- 5: Half Mars -->
  <text x="40" y="920" font-family="sans-serif" font-size="28" fill="#888">5. Half planet</text>
  <path d="M50 950 Q50 850 150 850 L250 850 Q250 950 150 950 Z" fill="url(#marsGrad)"/>
  <text x="40" y="980" font-family="sans-serif" font-size="55" fill="white" font-weight="700">AMARSBODY</text>
</svg>
