<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100">
  <rect width="400" height="100" fill="#ffffff"/>
  
  <defs>
    <radialGradient id="marsGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff8866;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#cc4400;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#992200;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="coralGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff7e5f"/>
      <stop offset="100%" style="stop-color:#feb47b"/>
    </linearGradient>
  </defs>
  
  <!-- Mars glow centered on BODY -->
  <circle cx="265" cy="45" r="40" fill="url(#marsGlow)"/>
  
  <!-- Text centered -->
  <text x="200" y="55" font-family="sans-serif" font-size="40" fill="#333" font-weight="400" text-anchor="middle">amarsbody</text>
  
  <!-- Soft underline centered -->
  <rect x="100" y="65" width="200" height="2" fill="url(#coralGrad)"/>
</svg>
